<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
   <form onsubmit="startQuiz(event)" id="formContainer">
    <h2>Start Your Quiz</h2>
    <input type="text" id="username" placeholder="Enter Username">
    <input type="email" id="email" placeholder="Enter Email">
    <input type="text" id="class" placeholder="Enter Class">
    <button type="submit">Start Quiz</button>
</form>
    <div class="quizContainer">

        <div class="header">
            <h1>Frontend Quiz</h1>
            <p id="userhead"></p>
        </div>

        <div class="body">
            <h1 id="questionElement">1. Which HTML tag is used to create a hyperlink?</h1>
            <div class="options">
                <ul id="optionELement">

                </ul>

            </div>

        </div>

        <div class="footer">
            <p id="quizProgress"> </p>
            <button disabled id="nextQuesBtn" onclick="nextQuestion()">Next</button>
        </div>


    </div>

    <div class="reportCardContainer">

    </div>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./app.js"></script>
</body>

</html>
