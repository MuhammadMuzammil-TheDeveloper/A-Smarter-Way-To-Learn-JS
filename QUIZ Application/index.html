<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Frontend Quiz</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <!-- ══ FORM ══ -->
    <form onsubmit="startQuiz(event)" id="formContainer">
        <h2>Start Your Quiz</h2>
        <p class="form-subtitle">Fill in your details to begin</p>

        <div class="form-group">
            <input type="text" id="username" placeholder="Enter Username" autocomplete="off">
            <i class="fa-solid fa-user input-icon"></i>
        </div>

        <div class="form-group">
            <input type="email" id="email" placeholder="Enter Email" autocomplete="off">
            <i class="fa-solid fa-envelope input-icon"></i>
        </div>

        <div class="form-group">
            <input type="text" id="class" placeholder="Enter Class" autocomplete="off">
            <i class="fa-solid fa-graduation-cap input-icon"></i>
        </div>

        <button type="submit">
            <i class="fa-solid fa-rocket" style="margin-right:6px;"></i>
            Start Quiz
        </button>
    </form>

    <!-- ══ QUIZ CONTAINER ══ -->
    <div class="quizContainer">

        <!-- Header -->
        <div class="header">
            <h1><i class="fa-solid fa-layer-group" style="margin-right:8px;opacity:0.85;font-size:18px;"></i>Frontend Quiz</h1>
            <p id="userhead"></p>
        </div>

        <!-- Progress bar (visual only — JS can update .quiz-progress-bar-fill width) -->
        <div class="quiz-progress-bar">
            <div class="quiz-progress-bar-fill" id="progressBarFill" style="width: 10%;"></div>
        </div>

        <!-- Body -->
        <div class="body">
            <div class="question-meta">
                <span class="question-badge"><i class="fa-solid fa-circle-question" style="margin-right:4px;"></i>Question</span>
            </div>
            <h1 id="questionElement">1. Which HTML tag is used to create a hyperlink?</h1>

            <div class="options">
                <ul id="optionELement">
                    <!-- options injected by JS -->
                </ul>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p id="quizProgress"> </p>
            <button disabled id="nextQuesBtn" onclick="nextQuestion()">
                Next <i class="fa-solid fa-arrow-right" style="font-size:12px;"></i>
            </button>
        </div>

    </div>

    <!-- ══ REPORT CARD ══ -->
    <div class="reportCardContainer">

        <div class="report-header">
            <div class="score-circle">
                <span class="score-num" id="scoreNum">0</span>
                <span class="score-label">Score</span>
            </div>
            <h1>Quiz Complete!</h1>
            <p class="report-tagline" id="reportTagline">Here's how you performed</p>
        </div>

        <div class="report-body">
            <div class="stat-grid">
                <div class="stat-card">
                    <span class="stat-value" id="statCorrect" style="color:#10b981;">—</span>
                    <span class="stat-name">Correct</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="statWrong" style="color:#ef4444;">—</span>
                    <span class="stat-name">Wrong</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="statTotal" style="color:#4f46e5;">—</span>
                    <span class="stat-name">Total</span>
                </div>
            </div>

            <p id="reportSummary" style="margin-bottom:20px;font-size:14px;text-align:center;"></p>

            <div class="report-actions">
                <button class="btn-primary-report" onclick="location.reload()">
                    <i class="fa-solid fa-rotate-right" style="margin-right:6px;"></i>Try Again
                </button>
                <button class="btn-outline-report" onclick="window.print()">
                    <i class="fa-solid fa-download" style="margin-right:6px;"></i>Save Result
                </button>
            </div>
        </div>

    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./app.js"></script>
</body>

</html>
